services:
  juleson:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juleson
    environment:
      - JULES_API_KEY=${JULES_API_KEY}
      - JULES_BASE_URL=https://jules.googleapis.com/v1alpha
      - JULES_LOG_LEVEL=info
    volumes:
      - .:/workspace
      - ./configs:/home/juleson/configs
    working_dir: /workspace
    entrypoint: ["juleson"]
    command: ["--help"]
    networks:
      - juleson-network

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juleson-mcp
    environment:
      - JULES_API_KEY=${JULES_API_KEY}
      - JULES_BASE_URL=https://jules.googleapis.com/v1alpha
      - JULES_LOG_LEVEL=info
    volumes:
      - ./configs:/home/juleson/configs
    entrypoint: ["juleson"]
    command: ["mcp", "serve"]
    networks:
      - juleson-network
    restart: unless-stopped

networks:
  juleson-network:
    driver: bridge

volumes:
  workspace:
    driver: local
